name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (arcllm)
        run: uv run mypy packages/arcllm/src/arcllm/ --strict
        continue-on-error: true

      - name: Mypy (arcrun)
        run: uv run mypy packages/arcrun/src/arcrun/ --strict
        continue-on-error: true

      - name: Mypy (arcagent)
        run: uv run mypy packages/arcagent/src/arcagent/ --strict
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --all-groups --python ${{ matrix.python-version }}

      - name: Run tests (arcllm)
        run: uv run pytest packages/arcllm/tests/ -v --tb=short

      - name: Run tests (arcrun)
        run: uv run pytest packages/arcrun/tests/ -v --tb=short

      - name: Run tests (arcagent)
        run: uv run pytest packages/arcagent/tests/ -v --tb=short

      - name: Run tests (arccmd)
        run: uv run pytest packages/arccli/tests/ -v --tb=short

      - name: Run tests (arcteam)
        run: uv run pytest packages/arcteam/tests/ -v --tb=short

      - name: Run adversarial security suite (SPEC-017)
        # This suite MUST pass. A failing test means a known
        # sandbox-bypass pattern has become reachable; the build
        # cannot merge until the defense is restored.
        run: uv run pytest packages/arcagent/tests/security/ -v --tb=short

      - name: Run performance gates (SPEC-017)
        # Policy pipeline p95 must stay under 1ms — enforced by
        # ``test_pipeline_p95_under_1ms_with_100_rules``.
        run: uv run pytest packages/arcagent/tests/performance/ -v --tb=short

  coverage:
    name: Coverage (SPEC-017 critical modules)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --all-packages --all-groups

      - name: Enforce coverage thresholds
        # Critical SPEC-017 modules must maintain ≥ 90% line coverage.
        # Overall SPEC-017 surface must maintain ≥ 80%.
        run: |
          uv run pytest \
            packages/arcagent/tests/unit/core/test_tool_policy.py \
            packages/arcagent/tests/unit/modules/proactive/ \
            packages/arcagent/tests/security/ \
            packages/arcagent/tests/unit/tools/test_tool_decorator.py \
            packages/arcagent/tests/unit/tools/test_dynamic_loader.py \
            packages/arcagent/tests/unit/tools/test_self_mod_tools.py \
            packages/arcagent/tests/unit/tools/test_extension_tool.py \
            packages/arcagent/tests/integration/test_tier_enforcement.py \
            packages/arcagent/tests/unit/core/test_metrics.py \
            --cov=arcagent.core.tool_policy \
            --cov=arcagent.core.metrics \
            --cov=arcagent.modules.proactive \
            --cov=arcagent.tools._decorator \
            --cov=arcagent.tools._dynamic_loader \
            --cov=arcagent.tools._egress \
            --cov=arcagent.tools.skill_tools \
            --cov=arcagent.tools.tool_tools \
            --cov=arcagent.tools.extension_tools \
            --cov-fail-under=80

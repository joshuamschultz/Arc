name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (arcllm)
        run: uv run mypy packages/arcllm/src/arcllm/ --strict
        continue-on-error: true

      - name: Mypy (arcrun)
        run: uv run mypy packages/arcrun/src/arcrun/ --strict
        continue-on-error: true

      - name: Mypy (arcagent)
        run: uv run mypy packages/arcagent/src/arcagent/ --strict
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --all-groups --python ${{ matrix.python-version }}

      - name: Run tests (arcllm)
        run: uv run pytest packages/arcllm/tests/ -v --tb=short

      - name: Run tests (arcrun)
        # arcrun targets Linux deployment (Firecracker microVMs, Docker
        # containers, Unix process groups). The sandbox/container code paths
        # depend on os.killpg/os.getpgid/os.getuid and unix:// sockets, none
        # of which exist on Windows. macOS is allowed because the BSD-style
        # process APIs are present even though container runtimes typically
        # are not.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arcrun/tests/ -v --tb=short

      - name: Run tests (arcagent)
        # arcagent's adversarial security suite exercises Firecracker /
        # process-group / Unix-socket code paths via arcrun. Windows is not
        # a supported deployment target for these guarantees.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arcagent/tests/ -v --tb=short

      - name: Run tests (arccmd)
        # arccli imports `fcntl` (Unix-only file locking) and uses
        # `os.fchmod` for atomic 0o600 token-file writes. Both are absent
        # on Windows. The CLI is a Unix-targeted operator surface.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arccli/tests/ -v --tb=short

      - name: Run tests (arcteam)
        # arcteam uses `fcntl.flock` for cross-process coordination of the
        # entity-file storage layer (see arcteam/memory/storage.py). fcntl
        # is a Unix-only module — Windows would fail at module-load.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arcteam/tests/ -v --tb=short


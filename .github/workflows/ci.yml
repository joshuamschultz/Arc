name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (arcllm)
        run: uv run mypy packages/arcllm/src/arcllm/ --strict

      - name: Mypy (arcrun)
        run: uv run mypy packages/arcrun/src/arcrun/ --strict

      - name: Mypy (arcagent)
        run: uv run mypy packages/arcagent/src/arcagent/ --strict

      - name: Mypy (arcmemory)
        run: uv run mypy packages/arcmemory/src/arcmemory/ --strict

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --all-groups --python ${{ matrix.python-version }}

      - name: Run tests (arcllm)
        run: uv run pytest packages/arcllm/tests/ -v --tb=short

      - name: Run tests (arcrun)
        # arcrun targets Linux deployment (Firecracker microVMs, Docker
        # containers, Unix process groups). The sandbox/container code paths
        # depend on os.killpg/os.getpgid/os.getuid and unix:// sockets, none
        # of which exist on Windows. macOS is allowed because the BSD-style
        # process APIs are present even though container runtimes typically
        # are not.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arcrun/tests/ -v --tb=short

      - name: Run tests (arcagent)
        # arcagent's adversarial security suite exercises Firecracker /
        # process-group / Unix-socket code paths via arcrun. Windows is not
        # a supported deployment target for these guarantees.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arcagent/tests/ -v --tb=short

      - name: Run tests (arccmd)
        # arccli imports `fcntl` (Unix-only file locking) and uses
        # `os.fchmod` for atomic 0o600 token-file writes. Both are absent
        # on Windows. The CLI is a Unix-targeted operator surface.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arccli/tests/ -v --tb=short

      - name: Run tests (arcteam)
        # arcteam uses `fcntl.flock` for cross-process coordination of the
        # entity-file storage layer (see arcteam/memory/storage.py). fcntl
        # is a Unix-only module — Windows would fail at module-load.
        if: runner.os != 'Windows'
        run: uv run pytest packages/arcteam/tests/ -v --tb=short

      - name: Run tests (arcmemory)
        # arcmemory uses os.replace for atomic markdown writes and the optional
        # sqlite-vec extension. Both work cross-platform; the vec extension load
        # is guarded so the suite runs with or without the [vec] extra.
        run: uv run pytest packages/arcmemory/tests/ -v --tb=short

  security:
    name: Security & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Export harness runtime closure
        # Scope the vulnerability gate to what Arc actually ships: every
        # workspace package + product extras (azure/cloud/container),
        # EXCLUDING the dev, test, and tutorial groups. Tutorial/help-docs
        # tooling (jupyter, jupyterlab, jupyter-server, tornado, bleach,
        # msgpack) and dev tooling (pip, pip-audit) are not part of the
        # deployed harness and must not gate every PR on their CVEs.
        run: |
          uv export --frozen --no-emit-workspace --no-hashes \
            --all-packages --all-extras --no-default-groups \
            --format requirements-txt > sbom/requirements-gate.txt

      - name: Vulnerability scan (pip-audit, harness runtime scope)
        # BLOCKING gate. Audits only the runtime closure exported above and
        # honors the POA&M in sbom/security-suppressions.txt — each accepted
        # residual is annotated there with its compensating control and
        # intended fix. Any NEW unignored vulnerability in the runtime closure
        # fails this job.
        run: |
          IGNORE_ARGS=()
          while read -r vid; do
            [ -n "$vid" ] && IGNORE_ARGS+=(--ignore-vuln "$vid")
          done < <(grep -vE '^\s*#|^\s*$' sbom/security-suppressions.txt | awk '{print $1}')
          uv run pip-audit --no-deps -r sbom/requirements-gate.txt "${IGNORE_ARGS[@]}"

      - name: Refresh CycloneDX SBOM
        run: |
          uv export --frozen --no-emit-project --no-hashes --all-packages \
            --format requirements-txt > sbom/requirements-nohash.txt
          uv tool run --from cyclonedx-bom cyclonedx-py requirements \
            sbom/requirements-nohash.txt --of JSON -o sbom/arc-python.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom/arc-python.cdx.json


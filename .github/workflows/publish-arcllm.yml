name: Publish arcllm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-arcllm
      url: https://pypi.org/project/arcllm/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd packages/arcllm && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/arcllm/dist/

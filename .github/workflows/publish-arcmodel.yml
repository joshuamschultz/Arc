name: Publish arcmodel

on:
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-arcmodel
      url: https://pypi.org/project/arcmodel/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd packages/arcmodel && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/arcmodel/dist/

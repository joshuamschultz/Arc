name: Publish arcskill

on:
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-arcskill
      url: https://pypi.org/project/arcskill/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd packages/arcskill && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/arcskill/dist/

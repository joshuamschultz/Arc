name: Publish arctui

on:
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-arctui
      url: https://pypi.org/project/arctui/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build --package arctui
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

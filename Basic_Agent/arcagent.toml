[agent]
name = "basic-agent"
org = "local"
type = "executor"
workspace = "./workspace"

[llm]
model = "anthropic/claude-haiku-4-5-20251001"
max_tokens = 4096
temperature = 0.7

[identity]
did = "agent:basic:one"
key_dir = "~/.arcagent/keys"

[vault]
backend = ""

[tools.policy]
allow = []
deny = []
timeout_seconds = 30

[telemetry]
enabled = true
service_name = "basic-agent"
log_level = "INFO"
export_traces = false

[context]
max_tokens = 128000

[eval]
provider = ""
model = ""
max_tokens = 1024
temperature = 0.2
fallback_behavior = "skip"

[memory]
context_budget_tokens = 2000
entity_extraction_enabled = false

[session]
retention_count = 50
retention_days = 30

[extensions]
global_dir = "~/.arcagent/extensions"

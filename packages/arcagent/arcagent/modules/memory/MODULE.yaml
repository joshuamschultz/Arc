name: memory
version: 0.1.0
description: 3-tier persistent memory with markdown files
author: ArcAgent
entry_point: arcagent.modules.memory:MarkdownMemoryModule
dependencies:
  - arcagent.core.module_bus
  - arcagent.core.config
events:
  subscribes:
    - agent:pre_tool
    - agent:post_tool
    - agent:assemble_prompt
    - agent:post_respond
    - agent:shutdown
  emits:
    - memory.background_error
    - identity.modified

name: scheduler
version: 0.1.0
description: Agent self-scheduling with cron, interval, and one-time tasks
author: ArcAgent
entry_point: arcagent.modules.scheduler:SchedulerModule
dependencies:
  - arcagent.core.module_bus
  - arcagent.core.config
events:
  subscribes:
    - agent:shutdown
  emits:
    - schedule:created
    - schedule:updated
    - schedule:cancelled
    - schedule:fired
    - schedule:completed
    - schedule:failed
    - schedule:skipped
    - schedule:circuit_open

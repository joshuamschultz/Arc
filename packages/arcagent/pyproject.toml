[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-agent"
version = "0.16.0"
description = "Enterprise-grade autonomous agent nucleus"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0,<3",
    "pydantic-settings>=2.14.2,<3",
    "pynacl>=1.5,<2",
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "httpx>=0.27,<1",
    "mcp>=1.25,<2",
    "arcllm>=0.1",
    "arcrun>=0.1",
    "arctrust>=0.1",
    "arcui>=0.1",
    "pyyaml>=6.0,<7",
    "tomlkit>=0.12",
    "websockets>=13.0,<16",
    "croniter>=2.0,<7",
    "aiorwlock>=1.4,<2",
]

[project.optional-dependencies]
# Dual-speed analogical memory. arcagent runs memory-less by default (NullBrain);
# installing this extra + setting [modules.memory] brain = "arcmemory" activates it.
memory = [
    "arcmemory",
]
telegram = [
    "python-telegram-bot>=20.0,<22",
]
slack = [
    "slack-bolt>=1.20.0",
    "aiohttp>=3.14.1,<4",
]
azure = [
    "azure-identity>=1.15",
    "azure-keyvault-secrets>=4.7",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "S",    # flake8-bandit
    "T20",  # flake8-print
    "RUF",  # ruff-specific
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "E402", "E501", "N806", "E741", "B007", "B017", "S603", "RUF043", "RUF059", "F811", "F821", "RUF003"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
# Skill scaffolding scripts are standalone, sandbox-executed files (never
# imported as package modules) and several share the basename ``validate.py``,
# which collides under module resolution. They are not part of the package's
# type surface.
exclude = ['builtins/capabilities/skills/.*/scripts/.*\.py$']

[[tool.mypy.overrides]]
module = ["arcllm.*", "arcrun.*", "arccli.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Azure SDK ships partial type stubs; ignore missing imports for optional dep.
module = ["azure.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Optional extra: slack_bolt is only installed with arc-agent[slack].
module = ["slack_bolt.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers -v"
markers = [
    "slow: live-runtime tests (real docker) excluded from the fast unit run",
]

[tool.hatch.build.targets.wheel]
packages = ["src/arcagent"]
# SPEC-047: guarantee the packaged blueprint presets ship in the wheel regardless of
# VCS state (they are loaded at runtime by arcagent.blueprints — not optional data).
artifacts = ["src/arcagent/blueprints/*.toml"]

[tool.coverage.run]
source = ["arcagent"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80

[dependency-groups]
dev = [
    "pytest==9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "types-PyYAML>=6.0",
    "types-croniter>=6.0",
    "freezegun>=1.0",
]

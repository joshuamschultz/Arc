[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcagent"
version = "0.2.0"
description = "Enterprise-grade autonomous agent nucleus"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0,<3",
    "pydantic-settings>=2.0,<3",
    "pynacl>=1.5,<2",
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "httpx>=0.27,<1",
    "mcp>=1.25,<2",
    "arcllm>=0.1",
    "arcrun>=0.1",
    "pyyaml>=6.0,<7",
    "websockets>=13.0,<16",
    "croniter>=1.3,<5",
]

[project.optional-dependencies]
telegram = [
    "python-telegram-bot>=20.0,<22",
]
slack = [
    "slack-bolt>=1.20.0",
    "aiohttp",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "S",    # flake8-bandit
    "T20",  # flake8-print
    "RUF",  # ruff-specific
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S108"]  # assert + /tmp paths expected in tests

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["arcllm.*", "arcrun.*", "arccli.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers -v"

[tool.hatch.build.targets.wheel]
packages = ["src/arcagent"]

[tool.coverage.run]
source = ["arcagent"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80

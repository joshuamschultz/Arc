# SPEC-047 packaged blueprint — provenance-trusted (ships read-only in the wheel).
# Deep-merged UNDER your own arcagent.toml values; a blueprint is a starting point.

[blueprint]
name = "personal-assistant"
version = "1.0.0"
tier = "personal"
description = "Personal assistant: memory + skills on, zero-config, no signing floors."

[security]
tier = "personal"

[modules.memory]
enabled = true

[modules.memory.config]
brain = "arcmemory"
# The distiller is the LLM seam that turns the raw event stream into durable
# curated memory (entity/person/place files, insights, daily summaries). Without
# it, consolidation is a no-op and only the zero-LLM daily stream is written.
# Override to match your agent's provider/model.
distill_provider = "anthropic"
distill_model = "claude-sonnet-5"

[modules.skills]
enabled = true

[modules.skills.config]
adapter = "arcskill"

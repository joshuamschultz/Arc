name: memory_acl
version: "0.1.0"
description: |
  Module Bus veto guard for memory operations.
  Subscribes to memory.read, memory.write, memory.search at priority 10
  (highest — runs before the existing memory module at 85/90).
  Vetoes unauthorized cross-session memory access based on session ACL
  frontmatter and tier-driven defaults.
  Issues and verifies per-turn signed capabilities (Ed25519 via PyNaCl).

author: Arc Team
priority: 10
events_subscribed:
  - memory.read
  - memory.write
  - memory.search
events_emitted:
  - session.acl.veto
  - session.acl.cross_session_read
security:
  threat_mitigations:
    - LLM01  # prompt injection — caller DID bound at transport layer
    - LLM02  # sensitive info disclosure — ACL filter at retrieval
    - ASI03  # identity abuse — DID bound; LLM cannot override
    - ASI06  # memory poisoning — write requires ownership
  owasp_references:
    - "OWASP LLM Top 10 2025: LLM01, LLM02"
    - "OWASP Agentic Security Initiative 2026: ASI03, ASI06"
  nist_controls:
    - "AC-3 (Access Enforcement)"
    - "AC-4 (Information Flow Enforcement)"
    - "AU-2 (Event Logging)"
    - "AU-9 (Protection of Audit Information)"
    - "IA-3 (Device Identification and Authentication)"
tier_behavior:
  federal: default ACL is private; all cross-session reads blocked unless explicitly shared
  enterprise: default ACL is shared-with-agent within team
  personal: default ACL is shared-with-agent
dependencies:
  - arcagent.core.module_bus
  - arcagent.core.identity
  - arcagent.core.telemetry
  - pynacl
  - pydantic

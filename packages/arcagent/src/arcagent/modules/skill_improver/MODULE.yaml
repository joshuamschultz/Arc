name: skill_improver
version: 0.1.0
description: Evolutionary optimization of skill procedure documents using execution traces and LLM-as-judge evaluation
author: ArcAgent
entry_point: arcagent.modules.skill_improver:SkillImproverModule
dependencies:
  - arcagent.core.module_bus
  - arcagent.core.config
  - arcagent.core.skill_registry
events:
  subscribes:
    - agent:post_tool
    - agent:post_plan
    - agent:post_respond
    - agent:ready
  emits:
    - skill_improver.optimization_started
    - skill_improver.optimization_completed
    - skill_improver.candidate_applied
    - skill_improver.rollback

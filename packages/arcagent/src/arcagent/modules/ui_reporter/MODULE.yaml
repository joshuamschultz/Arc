name: ui_reporter
version: 0.1.0
description: Bridges agent events to ArcUI dashboard via WebSocket
author: ArcAgent
entry_point: arcagent.modules.ui_reporter:UIReporterModule
dependencies:
  - arcagent.core.module_bus
  - arcagent.core.config
events:
  subscribes:
    - llm:call_complete
    - llm:config_change
    - llm:circuit_change
    - agent:init
    - agent:ready
    - agent:shutdown
    - agent:pre_respond
    - agent:post_respond
    - agent:error
    - agent:extensions_loaded
    - agent:skills_loaded
    - agent:tools_reloaded
    - agent:pre_tool
    - agent:post_tool
    - agent:pre_plan
    - agent:post_plan
    - agent:pre_compaction
  emits: []

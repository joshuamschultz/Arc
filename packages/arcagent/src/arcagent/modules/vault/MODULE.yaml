name: vault
version: "1.0.0"
description: >
  Tier-driven secret resolution with pluggable vault backends.
  Implements SDD §3.1 Platform Credentials policy:
  federal=hard error, enterprise=warn+fallback, personal=file/env.
priority: 5
enabled: true

backends:
  azure:
    class: "arcagent.modules.vault.backends.azure:AzureKeyVaultBackend"
    optional_deps:
      - azure-identity
      - azure-keyvault-secrets
  env:
    class: "arcagent.modules.vault.backends.env:EnvBackend"
  file:
    class: "arcagent.modules.vault.backends.file:FileBackend"
    notes: "Personal tier only. Files must be mode 0600."

tier_policy:
  federal:
    vault_required: true
    env_fallback: false
    file_fallback: false
  enterprise:
    vault_required: false
    env_fallback: true
    emit_audit_on_fallback: true
  personal:
    vault_required: false
    env_fallback: true
    file_fallback: true

audit_events:
  - vault.fallback
  - vault.secret_resolved
  - vault.unreachable

security:
  - "Never logs secret values"
  - "File backend enforces 0600 permissions"
  - "Federal tier: no env/file fallback regardless of env_fallback_var"

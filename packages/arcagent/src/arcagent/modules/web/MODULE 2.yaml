name: web
version: "1.0.0"
description: >
  Web search and extraction module. Provides web_search and web_extract
  tools with pluggable provider adapters (Parallel.ai, Firecrawl, Tavily).
  Federal tier enforces URL allowlist (glob patterns) and mandatory PII
  redaction via arcllm.security.

author: arc-core
spec: SPEC-018
tasks: T4.8

tools:
  - name: web_search
    description: Search the web and return ranked results
    required: false
  - name: web_extract
    description: Extract Markdown content from a URL
    required: false

config_schema:
  search_provider:
    type: string
    enum: [parallel, firecrawl, tavily]
    default: tavily
    description: Provider adapter to use for web_search
  extract_provider:
    type: string
    enum: [parallel, firecrawl, tavily]
    default: firecrawl
    description: Provider adapter to use for web_extract
  tier:
    type: string
    enum: [federal, enterprise, personal]
    default: personal
    description: Deployment tier — drives allowlist and PII defaults
  url_allowlist:
    type: array
    items:
      type: string
    default: []
    description: >
      Glob patterns for outbound URL allowlist.
      Federal tier REQUIRES non-empty value; all other URLs are denied.
      Enterprise tier uses this when non-empty; empty = allow all.
      Personal tier: not enforced.
  max_content_bytes:
    type: integer
    default: 1000000
    minimum: 1024
    description: Max extracted content bytes; excess is truncated (not dropped)
  pii_redaction_enabled:
    type: boolean
    default: true
    description: >
      Apply PII redaction to queries and extracted content.
      Always true at federal tier regardless of this setting.
  request_timeout_s:
    type: number
    default: 30.0
    minimum: 1.0
    maximum: 120.0
    description: HTTP timeout for provider API requests

secrets:
  - name: parallel_api_key
    description: Parallel.ai API key
    required_for: search_provider=parallel or extract_provider=parallel
  - name: firecrawl_api_key
    description: Firecrawl API key
    required_for: search_provider=firecrawl or extract_provider=firecrawl
  - name: tavily_api_key
    description: Tavily API key
    required_for: search_provider=tavily or extract_provider=tavily

security:
  owasp_mitigations:
    - LLM02: PII redaction on outbound queries and inbound content; mandatory at federal
    - LLM06: URL allowlist prevents agent from accessing unapproved external resources
    - ASI02: Tool parameters validated; URL checked before any network call
    - ASI03: API keys resolved from vault; never in config files or env at federal tier

audit_events:
  - web.search     # {provider, query_hash, result_count}
  - web.extract    # {provider, url, content_size_bytes, allowlist_match}
  - web.url_denied # {url, tier}
  - web.started    # {search_provider, extract_provider, tier, allowlist_size}

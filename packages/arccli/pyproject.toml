[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arccmd"
version = "0.2.0"
description = "Unified CLI for Arc products (arcllm, arcrun, arcagent)"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "click>=8.0",
    "arcllm",
    "arcrun",
    "arcagent[telegram]",
    "arcteam",
    "python-dotenv>=1.0",
]

[project.scripts]
arc = "arccli.main:cli"

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/arccli"]

[tool.pytest.ini_options]
testpaths = ["tests"]

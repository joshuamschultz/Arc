[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arccli"
version = "0.1.0"
description = "Unified CLI for Arc products (arcllm, arcrun, arcagent)"
requires-python = ">=3.12"
dependencies = [
    "click>=8.0",
    "arcllm",
    "arcrun",
    "arcagent",
    "arcteam",
    "python-dotenv>=1.0",
]

[project.scripts]
arc = "arccli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/arccli"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcgateway-slack"
version = "0.1.0"
description = "Slack (Socket Mode) platform adapter plugin for arcgateway"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "arcgateway>=0.2",
    "pydantic>=2.0,<3",
    "slack-bolt>=1.18",
    "slack-sdk>=3",
]

[project.entry-points."arcgateway.adapters"]
slack = "arcgateway_slack:PLUGIN"

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "E402", "E501", "N802", "N806", "E741", "B007", "B017", "S603", "RUF043", "RUF059", "F811", "F821", "RUF003"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["arcgateway.*", "arcagent.*"]
ignore_missing_imports = true

# slack-bolt and slack-sdk ship no type stubs; suppress missing-import errors.
[[tool.mypy.overrides]]
module = ["slack_bolt.*", "slack_sdk.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers -v"

[tool.hatch.build.targets.wheel]
packages = ["src/arcgateway_slack"]

[tool.coverage.run]
source = ["arcgateway_slack"]
branch = true

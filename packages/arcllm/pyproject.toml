[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcllm"
version = "0.6.0"
description = "Unified LLM abstraction layer for autonomous agents"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "opentelemetry-api>=1.20",
    "jcs>=0.2.1",
    "arcstore",
    "arctrust",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[project.optional-dependencies]
otel = [
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20",
    "opentelemetry-exporter-otlp-proto-http>=1.20",
]
trace-encryption = [
    # AES-256-GCM trace-body sealing. The FIPS provenance/gate lives in
    # arctrust (arctrust.fips reads the private
    # cryptography.hazmat.backends.openssl.backend._fips_enabled attribute —
    # no public API exists, pyca/cryptography#7722).
    "cryptography>=46.0.7,<47.0",
]
injection-semantic = [
    "numpy>=1.26",
]
guardrails-schema = [
    "jsonschema>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/arcllm"]

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "E402", "E501", "N806", "E741", "B007"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[[tool.mypy.overrides]]
# Optional runtime deps without published type stubs. Imported lazily inside
# try/except or feature-gated code paths; not installed in the type-check env.
module = ["boto3", "boto3.*", "botocore", "botocore.*", "opentelemetry.exporter.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# jsonschema is imported lazily inside GuardrailsModule (behind
# arcllm[guardrails-schema]) — not a hard runtime dependency.
module = ["jsonschema", "jsonschema.*"]
ignore_missing_imports = true

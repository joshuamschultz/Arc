[defaults]
provider = "anthropic"
temperature = 0.7
max_tokens = 4096

[vault]
backend = ""
cache_ttl_seconds = 300
url = ""
region = ""

# --- Classification-based routing ---
[modules.routing]
enabled = false
enforcement = "warn"
default_classification = "unclassified"

# [modules.routing.rules.cui]
# provider = "anthropic"
# model = "claude-sonnet-4-6"

# [modules.routing.rules.unclassified]
# provider = "openai"
# model = "gpt-4o-mini"

# --- Telemetry: token counting, cost tracking, TraceRecord emission ---
[modules.telemetry]
enabled = true
log_level = "INFO"
# Budget fields (all optional — budget disabled if none present)
# monthly_limit_usd = 500.00
# daily_limit_usd = 50.00
# per_call_max_usd = 5.00
# alert_threshold_pct = 80
# enforcement = "block"

# --- Audit: PII-safe metadata logging ---
[modules.audit]
enabled = false

# --- Retry: exponential backoff on transient failures ---
[modules.retry]
enabled = true
max_retries = 3
backoff_base_seconds = 1.0

# --- Fallback: provider failover chain ---
[modules.fallback]
enabled = false
chain = ["anthropic", "openai"]

# --- Rate limiting: per-minute request caps ---
[modules.rate_limit]
enabled = false
requests_per_minute = 60
burst_capacity = 60

# --- Queue: bounded concurrency with backpressure ---
[modules.queue]
enabled = true
max_concurrent = 2
call_timeout = 60.0
max_queued = 10

# --- OpenTelemetry distributed tracing ---
[modules.otel]
enabled = false
exporter = "otlp"
endpoint = "http://localhost:4317"
protocol = "grpc"
service_name = "arcllm"
sample_rate = 1.0
headers = {}
insecure = false
certificate_file = ""
client_key_file = ""
client_cert_file = ""
timeout_ms = 10000
max_batch_size = 512
max_queue_size = 2048
schedule_delay_ms = 5000

# --- Security: PII redaction + request signing ---
[modules.security]
enabled = false
pii_enabled = true
pii_detector = "regex"
pii_custom_patterns = []
signing_enabled = true
signing_algorithm = "hmac-sha256"
signing_key_env = "ARCLLM_SIGNING_KEY"

[modules.otel.resource_attributes]

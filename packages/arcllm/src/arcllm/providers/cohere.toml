[provider]
api_format = "openai-chat"
base_url = "https://api.cohere.com/compatibility"
api_key_env = "COHERE_API_KEY"
api_key_required = true
default_model = "command-a-03-2025"
default_temperature = 0.7
vault_path = ""

# Cohere models via the OpenAI-compatible endpoint.

[models.command-a-03-2025]
context_window = 128000
max_output_tokens = 8192
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 2.50
cost_output_per_1m = 10.00
cost_cache_read_per_1m = 0.0
cost_cache_write_per_1m = 0.0

[models.command-r7b-12-2024]
context_window = 128000
max_output_tokens = 4096
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 0.0375
cost_output_per_1m = 0.15
cost_cache_read_per_1m = 0.0
cost_cache_write_per_1m = 0.0

[models.command-r-plus-08-2024]
context_window = 128000
max_output_tokens = 4096
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 2.50
cost_output_per_1m = 10.00

[provider]
api_format = "openai-chat"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GOOGLE_API_KEY"
api_key_required = true
default_model = "gemini-2.5-flash"
default_temperature = 0.7
vault_path = ""

# --- Gemini 2.5 (GA) ---

[models."gemini-2.5-pro"]
context_window = 1000000
max_output_tokens = 65536
supports_tools = true
supports_vision = true
supports_thinking = true
input_modalities = ["text", "image", "audio", "video"]
cost_input_per_1m = 1.25
cost_output_per_1m = 10.00
cost_cache_read_per_1m = 0.315
cost_cache_write_per_1m = 1.25

[models."gemini-2.5-flash"]
context_window = 1000000
max_output_tokens = 65536
supports_tools = true
supports_vision = true
supports_thinking = true
input_modalities = ["text", "image", "audio", "video"]
cost_input_per_1m = 0.15
cost_output_per_1m = 0.60
cost_cache_read_per_1m = 0.0375
cost_cache_write_per_1m = 0.15

[models."gemini-2.5-flash-lite"]
context_window = 1000000
max_output_tokens = 65536
supports_tools = true
supports_vision = true
supports_thinking = false
input_modalities = ["text", "image", "audio", "video"]
cost_input_per_1m = 0.075
cost_output_per_1m = 0.30
cost_cache_read_per_1m = 0.01875
cost_cache_write_per_1m = 0.075

# --- Gemini 2.0 (retiring Jun 2026) ---

[models."gemini-2.0-flash"]
context_window = 1000000
max_output_tokens = 8192
supports_tools = true
supports_vision = true
supports_thinking = false
input_modalities = ["text", "image", "audio", "video"]
cost_input_per_1m = 0.10
cost_output_per_1m = 0.40
cost_cache_read_per_1m = 0.025
cost_cache_write_per_1m = 0.10

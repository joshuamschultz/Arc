[provider]
api_format = "openai-chat"
base_url = "http://localhost:8000"
api_key_env = "VLLM_API_KEY"
api_key_required = false
default_model = "meta-llama/Llama-3.1-8B-Instruct"
default_temperature = 0.7
vault_path = ""

[models."meta-llama/Llama-3.1-8B-Instruct"]
context_window = 128000
max_output_tokens = 4096
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 0.0
cost_output_per_1m = 0.0
cost_cache_read_per_1m = 0.0
cost_cache_write_per_1m = 0.0

[models."meta-llama/Llama-3.1-70B-Instruct"]
context_window = 128000
max_output_tokens = 4096
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 0.0
cost_output_per_1m = 0.0
cost_cache_read_per_1m = 0.0
cost_cache_write_per_1m = 0.0

[models."mistralai/Mistral-7B-Instruct-v0.3"]
context_window = 32000
max_output_tokens = 4096
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 0.0
cost_output_per_1m = 0.0
cost_cache_read_per_1m = 0.0
cost_cache_write_per_1m = 0.0

# --- Optional endpoint pool for load balancing (SPEC-017) ---
# Self-hosted replicas serving the same model behind different base_urls.
# When present AND load_balance is enabled, invokes round-robin across
# replicas instead of saturating a single one.
#
# [[endpoints]]
# base_url = "http://vllm-replica-1:8000"
# weight = 1
#
# [[endpoints]]
# base_url = "http://vllm-replica-2:8000"
# weight = 1
#
# [[endpoints]]
# base_url = "http://vllm-replica-3:8000"
# weight = 1

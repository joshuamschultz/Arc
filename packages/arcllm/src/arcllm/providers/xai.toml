[provider]
api_format = "openai-chat"
base_url = "https://api.x.ai"
api_key_env = "XAI_API_KEY"
api_key_required = true
default_model = "grok-3"
default_temperature = 0.7
vault_path = ""

[models.grok-4]
context_window = 256000
max_output_tokens = 16384
supports_tools = true
supports_vision = false
supports_thinking = true
input_modalities = ["text"]
cost_input_per_1m = 5.00
cost_output_per_1m = 25.00
cost_cache_read_per_1m = 1.25
cost_cache_write_per_1m = 5.00

[models.grok-3]
context_window = 131072
max_output_tokens = 8192
supports_tools = true
supports_vision = false
supports_thinking = false
input_modalities = ["text"]
cost_input_per_1m = 3.00
cost_output_per_1m = 15.00
cost_cache_read_per_1m = 0.75
cost_cache_write_per_1m = 3.00

[models.grok-3-mini]
context_window = 131072
max_output_tokens = 8192
supports_tools = true
supports_vision = false
supports_thinking = true
input_modalities = ["text"]
cost_input_per_1m = 0.30
cost_output_per_1m = 0.50
cost_cache_read_per_1m = 0.075
cost_cache_write_per_1m = 0.30

[models.grok-2-vision-1212]
context_window = 32768
max_output_tokens = 8192
supports_tools = false
supports_vision = true
supports_thinking = false
input_modalities = ["text", "image"]

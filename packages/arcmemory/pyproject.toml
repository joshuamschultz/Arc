[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcmemory"
version = "0.3.0"
description = "Arc's memory substrate — dual-speed analogical memory (four stores, zero-LLM fast capture, glass-box brain)"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
# arcmemory sits BELOW arcagent in the DAG: it depends only on arctrust
# (audit/policy/classification), arcllm (embed + distill), and arcstore
# (optional telemetry spool). It NEVER depends on arcagent or arcrun.
dependencies = [
    "arctrust>=0.1",
    "arcllm>=0.1",
    "arcstore>=0.1",
    "pydantic>=2.0,<3",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# In-process cosine vector index (surface + structural channels). Guarded at
# load time; absence degrades retrieval to BM25 + graph (never fails).
vec = ["sqlite-vec>=0.1.6"]
# Offline, deterministic local embedder (bge-small / MiniLM). Federal air-gap
# path — no network embeddings API.
local = ["sentence-transformers>=3.0"]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/arcmemory"]

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "S603", "E402", "E501", "N806", "E741"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

# sqlite-vec ships no type stubs and is an optional [vec] extra — guarded by a
# runtime importability check. Ignore missing imports so strict passes with or
# without the extra installed.
[[tool.mypy.overrides]]
module = ["sqlite_vec", "sqlite_vec.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers -v"

[tool.coverage.run]
source = ["arcmemory"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80

[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "sqlite-vec>=0.1.6",
    "types-pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcrun"
version = "0.9.0"
description = "Async execution engine for autonomous agents"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "arcllm",
    "arctrust",
    "arcstore",
    "jsonschema>=4.0",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[project.optional-dependencies]
container = ["docker>=7.0,<9"]

[tool.hatch.build.targets.wheel]
packages = ["src/arcrun"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "slow: live-runtime tests (real docker / Firecracker) excluded from the fast unit run",
]

[tool.mypy]
strict = true
warn_return_any = true

# Third-party libs that ship no type stubs (matches the sibling-package
# convention, e.g. arcteam/arcgateway). jsonschema validates tool params in
# executor.py; docker backs the optional container execute backend.
[[tool.mypy.overrides]]
module = ["jsonschema", "jsonschema.*", "docker", "docker.*"]
ignore_missing_imports = true
# When docker IS installed but ships no stubs, mypy reports import-untyped
# rather than a missing import; suppress that too so the optional backend
# never trips the strict gate.
disable_error_code = ["import-untyped"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "E402", "E501", "N806", "N814", "E741", "B007"]
"src/arcrun/builtins/contained_execute.py" = ["S108"]
"src/arcrun/builtins/execute.py" = ["S108"]
# "/tmp" is the in-GUEST working-dir default written to vmconfig, not a host temp path.
"src/arcrun/backends/vm.py" = ["S108"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcrun"
version = "0.2.0"
description = "Async execution engine for autonomous agents"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "arcllm",
    "jsonschema>=4.0",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[project.optional-dependencies]
container = ["docker>=7.0,<9"]

[tool.hatch.build.targets.wheel]
packages = ["src/arcrun"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true
warn_return_any = true

[tool.ruff]
target-version = "py311"
line-length = 100

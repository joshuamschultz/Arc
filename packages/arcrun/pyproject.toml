[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcrun"
version = "0.1.0"
description = "Async execution engine for autonomous agents"
requires-python = ">=3.12"
dependencies = [
    "arcllm",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
container = ["docker>=7.0,<9"]

[tool.hatch.build.targets.wheel]
packages = ["src/arcrun"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true
warn_return_any = true

[tool.ruff]
target-version = "py312"
line-length = 100

name: arcskill.hub
version: "0.1.0"
description: >
  Skills Hub: signed-install pipeline with Sigstore verification,
  multi-layer security scanner, sandboxed dry-run, and CRL-based
  revocation lifecycle. Default-OFF; enable via [skills.hub] enabled = true.
author: Arc Foundation
license: Apache-2.0

config_gate: skills.hub.enabled
default_enabled: false

capabilities:
  - skill_install
  - skill_scan
  - skill_revoke

dependencies:
  required:
    - arcskill
  optional:
    - sigstore>=3.0
    - semgrep>=1.50
    - bandit>=1.7
    - pyyaml
    - httpx>=0.27

security:
  classification_aware: true
  audit_all_operations: true
  fail_closed_on_error: true
  tier_policy: |
    federal: signature required, SLSA L3, Firecracker dry-run mandatory
    enterprise: signature required, SLSA L2, Docker dry-run
    personal: signature optional, Docker dry-run when available

test_fixture: "python -c \"from arcskill.hub import HubConfig; print('hub import ok')\""

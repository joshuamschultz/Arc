[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcstack"
version = "0.2.0"
description = "Arc: Security-first autonomous agent framework — install the full stack"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "arccmd>=0.2",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Documentation = "https://github.com/joshuamschultz/Arc#readme"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/arcstack"]

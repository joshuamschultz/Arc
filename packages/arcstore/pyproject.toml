[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcstore"
version = "0.2.0"
description = "Operational/observability data plane for Arc — always-on spool + pluggable store"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "arctrust>=0.1",
    "pydantic>=2.0,<3",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.29"]
cloud = ["boto3>=1.34"]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"
Issues = "https://github.com/joshuamschultz/Arc/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/arcstore"]

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "S603", "E402", "E501", "N806", "E741"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers -v"
markers = [
    "slow: stress/soak test not run on every push (opt in via -m slow)",
]

[tool.coverage.run]
source = ["arcstore"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80

[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
]

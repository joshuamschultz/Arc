[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcteam"
version = "0.2.0"
description = "Multi-agent team coordination, communication, and lifecycle management"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0,<3",
    "python-frontmatter>=1.0",
    "rank-bm25>=0.2.2",
]

[project.scripts]
arc-team = "arcteam.cli:main"
arc-memory = "arcteam.memory.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/arcteam"]

[tool.ruff]
target-version = "py312"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S108"]
"src/arcteam/cli.py" = ["T201"]  # CLI uses print for output
"src/arcteam/memory/cli.py" = ["T201"]  # CLI uses print for output

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["arcagent.*", "arcllm.*", "arcrun.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers -v"

[tool.coverage.run]
source = ["arcteam"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80

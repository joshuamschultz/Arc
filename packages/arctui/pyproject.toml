[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arctui"
version = "0.0.1"
description = "Arc terminal UI — coming soon"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 1 - Planning",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"

[tool.hatch.build.targets.wheel]
packages = ["src/arctui"]

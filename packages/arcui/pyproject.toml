[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcui"
version = "0.1.0"
description = "Arc LLM telemetry dashboard — real-time monitoring UI"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "starlette>=0.40",
    "uvicorn[standard]>=0.30",
    "tomlkit>=0.12",
    "arcllm>=0.1",
    "websockets>=12.0",
]

[project.urls]
Homepage = "https://github.com/joshuamschultz/Arc"
Repository = "https://github.com/joshuamschultz/Arc"

[tool.hatch.build.targets.wheel]
packages = ["src/arcui"]

[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "S603", "S310", "E402", "E501", "N806", "E741", "B007"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

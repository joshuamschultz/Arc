[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcrun"
version = "0.1.0"
description = "Async execution engine for autonomous agents"
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/arcrun"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true
warn_return_any = true

[tool.ruff]
target-version = "py311"
line-length = 100

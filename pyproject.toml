[project]
name = "arc"
version = "0.1.0"
description = "Arc: Autonomous agent framework"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
arcllm = { workspace = true }
arcrun = { workspace = true }
arcagent = { workspace = true }
arccli = { workspace = true }

[tool.ruff]
target-version = "py312"
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "S", "T20", "RUF"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--strict-markers -v"
